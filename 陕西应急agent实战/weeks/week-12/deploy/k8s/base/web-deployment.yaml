apiVersion: apps/v1
kind: Deployment
metadata:
  name: highway-agent-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: highway-agent-web
  template:
    metadata:
      labels:
        app: highway-agent-web
    spec:
      containers:
        - name: web
          image: shaanxi-highway-agent-web:0.12.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
