name: course-ci

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11.11"
      - name: 安装最终周后端依赖
        run: python -m pip install -r weeks/week-12/backend/requirements.lock.txt
      - name: 验证课程结构与十二周后端
        env:
          PYTHON_BIN: python
        run: |
          bash scripts/verify_structure.sh
          bash scripts/test_all_weeks.sh
      - name: 执行真实 Supervisor 场景评测
        run: |
          cd weeks/week-12
          PYTHONPATH=backend/src python evals/run.py evals/week12_cases.jsonl
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
      - name: 测试并构建 Vue 指挥台
        run: |
          cd weeks/week-12/frontend
          npm install
          npm run test:run
          npm run build
      - name: 验证 Docker Compose 与 Kustomize
        run: |
          cd weeks/week-12
          docker compose -f compose.demo.yaml config --quiet
          kubectl kustomize deploy/k8s/overlays/dev >/dev/null
          kubectl kustomize deploy/k8s/overlays/prod >/dev/null
